<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Hub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>Download Hub</h1>
      <p>Browse and download app installers</p>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <input type="text" id="searchInput" placeholder="Search installers..." oninput="renderInstallers()">
    </section>

    <section id="installerList" class="installer-grid">
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 Download Hub</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
